name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # The test suite runs on stub STT / offline LLM / keyword KB / mock flight
      # (forced in tests/conftest.py), so it needs only the light import deps —
      # torch/chromadb/sentence-transformers stay lazy and uninstalled here.
      - name: Install light backend deps
        run: |
          pip install "fastapi>=0.110" "uvicorn[standard]>=0.29" "pydantic>=2.6" \
            python-multipart "python-dotenv>=1.0" "langgraph>=1.0" "langchain-core>=1.0" \
            pyyaml pytest httpx
      - name: Run backend tests
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install + build
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run build
