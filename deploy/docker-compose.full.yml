# FULL profile override (TDD-09): the real assistant — fine-tuned Whisper STT,
# ChromaDB multilingual RAG, local MMS-TTS, and live providers. Layer it on top
# of the base compose:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.full.yml up --build
#
# Keys (GROQ/OPENAI/AIRLABS) come from backend/.env (gitignored; copy from
# backend/.env.example). First run downloads the models into the `models` volume
# (~2 GB) — boot is slower. Build the RAG store once it's up:
#   docker compose exec backend python -m app.kb.ingest --all
services:
  backend:
    env_file:
      - path: ../backend/.env
        required: false
    environment:
      LOAD_STT: "true"                                  # fine-tuned Whisper (owned model)
      LLM_PROVIDER: "${LLM_PROVIDER:-groq}"             # or openai / offline
      KB_RETRIEVER: "chroma"                            # real multilingual embeddings
      TTS_PROVIDER: "local"                             # MMS-TTS neural voices
      FLIGHT_API_PROVIDER: "${FLIGHT_API_PROVIDER:-airlabs}"
