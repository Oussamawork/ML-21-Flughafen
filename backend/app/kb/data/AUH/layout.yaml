# Airport map graph (TDD-04 §3.1) — powers `directions` (TDD-03) and the frontend
# map (TDD-07, /map). Schematic AUH (Midfield, Terminal A): a central spine
# (entrance -> check-in -> security -> duty free) feeding four concourses A/B/C/D.
# Real gate codes (e.g. C33, B20, A1) resolve to their concourse by leading letter,
# so live AirLabs data routes on the map. Positions are % coords (0-100).

nodes:
  entrance: Main entrance
  check-in: Check-in hall
  security: Security control
  duty-free: Duty free plaza
  baggage: Baggage reclaim
  concourse-a: Concourse A
  concourse-b: Concourse B
  concourse-c: Concourse C
  concourse-d: Concourse D

positions:
  entrance: {x: 7, y: 55}
  check-in: {x: 20, y: 55}
  security: {x: 33, y: 55}
  duty-free: {x: 47, y: 55}
  baggage: {x: 33, y: 26}
  concourse-a: {x: 73, y: 20}
  concourse-b: {x: 85, y: 42}
  concourse-c: {x: 85, y: 66}
  concourse-d: {x: 73, y: 88}

# Undirected edges with walking distance in metres (loader makes them symmetric).
edges:
  - {a: entrance, b: check-in, distance_m: 90}
  - {a: check-in, b: security, distance_m: 120}
  - {a: security, b: duty-free, distance_m: 85}
  - {a: security, b: baggage, distance_m: 110}
  - {a: duty-free, b: concourse-a, distance_m: 220}
  - {a: duty-free, b: concourse-b, distance_m: 240}
  - {a: duty-free, b: concourse-c, distance_m: 260}
  - {a: duty-free, b: concourse-d, distance_m: 300}

# Rectangular zone labels for the map (% layout): x, y, w, h.
zones:
  - {label: Entrance, x: 2, y: 46, w: 12, h: 18}
  - {label: Check-in, x: 15, y: 43, w: 13, h: 24}
  - {label: Security, x: 29, y: 43, w: 11, h: 24}
  - {label: Retail Plaza, x: 41, y: 41, w: 15, h: 28}
  - {label: Baggage Reclaim, x: 22, y: 15, w: 24, h: 20}
  - {label: Concourses, x: 64, y: 12, w: 32, h: 80}

# Any gate code resolves to its concourse by leading letter (airport-agnostic) —
# so a real gate like C33/B20/A1 routes even though it isn't listed individually.
concourses:
  A: concourse-a
  B: concourse-b
  C: concourse-c
  D: concourse-d

# Arrivals: any AirLabs arr_baggage belt resolves to the reclaim hall.
baggage_node: baggage

# Average walking speed (m/min) used for walking_time_min in route summaries.
walking_speed_m_per_min: 75
