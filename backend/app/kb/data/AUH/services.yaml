# Airport services (TDD-04) — backs the `find_service` tool. `node` ties each
# service to a layout.yaml node for routing/proximity (kept in sync with layout).
services:
  - id: pharmacy-a
    name: Airport Pharmacy
    type: pharmacy
    terminal: A
    zone: After security
    node: security
    hours: 24/7
  - id: lounge-c
    name: Pearl Lounge
    type: lounge
    terminal: A
    zone: Concourse C
    node: concourse-c
    hours: 05:00-01:00
  - id: coffee-df
    name: Sky Coffee
    type: coffee
    terminal: A
    zone: Duty free plaza
    node: duty-free
    hours: 24/7
  - id: restaurant-b
    name: Cloud Table
    type: restaurant
    terminal: A
    zone: Concourse B
    node: concourse-b
    hours: 06:00-23:00
  - id: restroom-central
    name: Central Restrooms
    type: restroom
    terminal: A
    zone: After security
    node: security
    hours: 24/7
  - id: atm-checkin
    name: Check-in ATMs
    type: atm
    terminal: A
    zone: Check-in hall
    node: check-in
    hours: 24/7
