# Darija fine-tuning preset — DODa audio dataset (Moroccan Darija).
#
# Inherits the structure of default.yaml; run with:
#   python -m src.train --config config/doda_darija.yaml
#
# Dataset: atlasia/DODa-audio-dataset — 12,743 parallel speech/text samples
# (~9h46m) from the published Darija Open Dataset, with Darija transcriptions in
# Arabic script and Latin (Arabizi) plus English translations. License: see the
# dataset card (DODa is openly released for research).
#
# Schema confirmed from the HF Hub dataset card (atlasia/DODa-audio-dataset):
#   splits:  train only (12,743 examples) — no test/validation split
#   columns: audio (16 kHz), darija_Latn, darija_Arab_new, darija_Arab_old, english
# We use `darija_Arab_new` (Arabic-script transcription) as the target Whisper text.
# Because there is no eval split, eval_split: null carves a validation set out of
# train; the carve is grouped by sentence so the same utterance never lands in
# both train and eval (see data.load_splits).
# NOTE: the dataset is gated ("gated: auto") — accept the terms on the dataset
# page and authenticate (`huggingface-cli login`) before training.

model:
  name: openai/whisper-small
  language: arabic
  task: transcribe

dataset:
  name: atlasia/DODa-audio-dataset
  config: null
  train_split: train
  eval_split: null            # no eval split on the Hub -> carve from train
  test_size: 0.1
  audio_column: audio
  text_column: darija_Arab_new  # Arabic-script Darija transcription (confirmed on the Hub)
  max_train_samples: null
  max_eval_samples: null

preprocessing:
  sampling_rate: 16000
  max_label_length: 225
  max_audio_seconds: 30.0
  lowercase: false
  remove_punctuation: false

training:
  output_dir: ./outputs/whisper-small-doda-darija
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-5
  warmup_steps: 300
  max_steps: 3000
  gradient_checkpointing: true
  fp16: true
  eval_strategy: steps
  eval_steps: 300
  save_steps: 300
  logging_steps: 25
  save_total_limit: 2
  predict_with_generate: true
  generation_max_length: 225
  load_best_model_at_end: true
  metric_for_best_model: wer
  greater_is_better: false
  report_to: tensorboard
  seed: 42
  num_workers: 2
  push_to_hub: false
  hub_model_id: null
