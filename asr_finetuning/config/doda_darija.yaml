# Darija fine-tuning preset — DODa audio dataset (Moroccan Darija).
#
# Inherits the structure of default.yaml; run with:
#   python -m src.train --config config/doda_darija.yaml
#
# Dataset: atlasia/DODa-audio-dataset — 12,743 parallel speech/text samples
# (~9h46m) from the published Darija Open Dataset, with Darija transcriptions in
# Arabic script and Latin (Arabizi) plus English translations. License: see the
# dataset card (DODa is openly released for research).
#
# ⚠️ VERIFY BEFORE TRAINING: open the dataset viewer on the HF Hub and confirm
# the exact column names + available splits, then adjust `text_column` /
# `audio_column` / `eval_split` below if they differ. The loader will otherwise
# fail fast and print the available columns. Best guess wired below:
#   audio_column: audio
#   text_column:  darija_ar   (Arabic-script transcription — what Whisper wants)
# DODa-audio may ship a single `train` split; eval_split: null carves a 10%
# validation set automatically.

model:
  name: openai/whisper-small
  language: arabic
  task: transcribe

dataset:
  name: atlasia/DODa-audio-dataset
  config: null
  train_split: train
  eval_split: null        # auto-carve validation from train
  test_size: 0.1
  audio_column: audio
  text_column: darija_ar  # Arabic-script Darija transcription (verify on the Hub)
  max_train_samples: null
  max_eval_samples: null

preprocessing:
  sampling_rate: 16000
  max_label_length: 225
  max_audio_seconds: 30.0
  lowercase: false
  remove_punctuation: false

training:
  output_dir: ./outputs/whisper-small-doda-darija
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-5
  warmup_steps: 300
  max_steps: 3000
  gradient_checkpointing: true
  fp16: true
  eval_strategy: steps
  eval_steps: 300
  save_steps: 300
  logging_steps: 25
  save_total_limit: 2
  predict_with_generate: true
  generation_max_length: 225
  load_best_model_at_end: true
  metric_for_best_model: wer
  greater_is_better: false
  report_to: tensorboard
  seed: 42
  num_workers: 2
  push_to_hub: false
  hub_model_id: null
